<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>配件清点(手机优化版)</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #2563eb; --success: #059669; --error: #dc2626; --bg: #f1f5f9; }
        
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; }
        
        /* 顶部导航栏 - 固定高度 */
        .nav-header { 
            background: white; padding: 10px 15px; display: flex; 
            justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .nav-header h2 { font-size: 18px; margin: 0; }

        .container { padding: 12px; }

        /* 操作面板 - 针对手机优化 */
        .action-panel { 
            background: white; padding: 15px; border-radius: 12px; 
            margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .input-group { margin-bottom: 10px; }
        label { font-size: 13px; color: #64748b; font-weight: 600; display: block; margin-bottom: 5px; }
        
        input { 
            width: 100%; padding: 12px; border: 2px solid #e2e8f0; 
            border-radius: 8px; font-size: 16px; box-sizing: border-box;
            -webkit-appearance: none; /* 移除iOS默认阴影 */
        }
        input:focus { border-color: var(--primary); outline: none; }

        /* 联想搜索结果 */
        .suggest-list { 
            position: absolute; left: 27px; right: 27px; background: white; 
            border: 1px solid #e2e8f0; border-radius: 8px; 
            box-shadow: 0 10px 15px rgba(0,0,0,0.1); z-index: 1000; 
            max-height: 250px; overflow-y: auto; 
        }
        .suggest-item { padding: 15px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; font-size: 15px; }

        /* 数据显示 - 核心优化：手机端变卡片，电脑端变表格 */
        .data-list { display: flex; flex-direction: column; gap: 10px; }
        
        /* 移动端卡片样式 */
        .item-card { 
            background: white; padding: 15px; border-radius: 10px; 
            border-left: 5px solid #cbd5e1; position: relative;
        }
        .item-card.active { border-left-color: var(--primary); background: #eff6ff; }
        .item-card.match { border-left-color: var(--success); }
        .item-card.diff { border-left-color: var(--error); }

        .card-row { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .card-label { color: #64748b; font-size: 13px; }
        .card-val { font-weight: 600; font-size: 15px; }
        
        .badge { font-size: 12px; padding: 2px 6px; border-radius: 4px; background: #f1f5f9; }

        /* 底部操作台 - 针对大文件时的导出按钮 */
        .footer-tools { position: fixed; bottom: 0; width: 100%; display: flex; background: white; border-top: 1px solid #e2e8f0; }
        .btn-flex { flex: 1; padding: 15px; text-align: center; font-weight: 600; border: none; font-size: 14px; }
        
        /* 媒体查询：只有在大屏幕（如平板/电脑）才恢复表格显示 */
        @media (min-width: 768px) {
            .data-list { display: table; width: 100%; background: white; border-radius: 12px; overflow: hidden; }
            .item-card { display: table-row; }
            .card-row { display: table-cell; padding: 15px; border-bottom: 1px solid #f1f5f9; }
            .card-label { display: none; }
            .nav-header h2 { font-size: 24px; }
        }
    </style>
</head>
<body>

<div id="app">
    <div class="nav-header">
        <h2>配件清点助手</h2>
        <div style="font-size: 12px; color: #64748b;">
            进度: {{ countedCount }}/{{ list.length }}
        </div>
    </div>

    <div class="container">
        <div v-if="list.length === 0" style="padding: 50px 0; text-align: center;">
            <button class="btn-flex" style="background:var(--primary); color:white; border-radius:8px; width:200px;" @click="triggerUpload">选择 Excel 文件</button>
            <input type="file" id="fileInput" style="display:none" @change="handleFileUpload" accept=".xlsx, .xls">
            <p style="color:#94a3b8; margin-top:15px; font-size:14px;">支持件号、数量字段识别</p>
        </div>

        <div class="action-panel" v-if="list.length > 0">
            <div class="input-group">
                <label>🔍 搜索件号</label>
                <input type="text" v-model="searchQuery" placeholder="输入关键词..." @input="showSuggests = true">
                <div class="suggest-list" v-if="showSuggests && suggestions.length > 0">
                    <div v-for="item in suggestions" :key="item.partNo" class="suggest-item" @click="selectItem(item)">
                        <span>{{ item.partNo }}</span>
                        <span class="badge">应收: {{ item.expected }}</span>
                    </div>
                </div>
            </div>

            <div class="input-group" v-if="selectedItem">
                <label>🔢 输入 [{{ selectedItem.partNo }}] 实收数</label>
                <input type="number" ref="qtyInput" v-model.number="tempQty" @keyup.enter="confirmQty" placeholder="输入数量并按回车">
            </div>
        </div>

        <div class="data-list" v-if="list.length > 0">
            <div v-for="item in filteredList" :key="item.partNo" 
                 :class="['item-card', getStatusClass(item), selectedItem?.partNo === item.partNo ? 'active' : '']">
                
                <div class="card-row">
                    <span class="card-val" style="color:var(--primary)">{{ item.partNo }}</span>
                    <span class="badge" v-if="item.actual !== null">{{ getStatusText(item) }}</span>
                </div>
                
                <div style="display: flex; gap: 20px; margin-top: 10px;">
                    <div style="flex: 1;">
                        <span class="card-label">应收: </span>
                        <span class="card-val">{{ item.expected }}</span>
                    </div>
                    <div style="flex: 1;">
                        <span class="card-label">实收: </span>
                        <span class="card-val">{{ item.actual !== null ? item.actual : '-' }}</span>
                    </div>
                    <div style="flex: 1;">
                        <span class="card-label">差异: </span>
                        <span class="card-val" :style="getDiffStyle(item)">{{ getDiff(item) }}</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer-tools" v-if="list.length > 0">
        <button class="btn-flex" style="background:#f1f5f9; color:#64748b" @click="clearAll">重置</button>
        <button class="btn-flex" style="background:var(--success); color:white" @click="exportResults">导出结果 (Excel)</button>
    </div>
</div>

<script>
const { createApp, ref, computed, nextTick, watch } = Vue;

createApp({
    setup() {
        const list = ref([]);
        const searchQuery = ref('');
        const showSuggests = ref(false);
        const selectedItem = ref(null);
        const tempQty = ref(null);
        const qtyInput = ref(null);

        // 初始化从本地读取
        const saved = localStorage.getItem('inventory_pro_data');
        if (saved) list.value = JSON.parse(saved);

        // 自动保存
        watch(list, (n) => localStorage.setItem('inventory_pro_data', JSON.stringify(n)), { deep: true });

        const triggerUpload = () => document.getElementById('fileInput').click();

        const handleFileUpload = (e) => {
            const reader = new FileReader();
            reader.onload = (evt) => {
                const workbook = XLSX.read(evt.target.result, { type: 'binary' });
                const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                list.value = json.map(r => ({
                    partNo: String(r['件号'] || r['Part'] || Object.values(r)[0]),
                    expected: Number(r['数量'] || r['Qty'] || Object.values(r)[1] || 0),
                    actual: null
                }));
            };
            reader.readAsBinaryString(e.target.files[0]);
        };

        const suggestions = computed(() => {
            if (!searchQuery.value) return [];
            return list.value.filter(i => i.partNo.toLowerCase().includes(searchQuery.value.toLowerCase())).slice(0, 8);
        });

        const selectItem = (item) => {
            selectedItem.value = item;
            tempQty.value = item.actual;
            searchQuery.value = item.partNo;
            showSuggests.value = false;
            nextTick(() => qtyInput.value.focus());
        };

        const confirmQty = () => {
            if (selectedItem.value) {
                selectedItem.value.actual = tempQty.value;
                searchQuery.value = '';
                selectedItem.value = null;
                tempQty.value = null;
            }
        };

        const getDiff = (i) => i.actual === null ? '-' : i.actual - i.expected;
        const getStatusClass = (i) => {
            if (i.actual === null) return '';
            return (i.actual - i.expected === 0) ? 'match' : 'diff';
        };
        const getStatusText = (i) => (i.actual - i.expected === 0) ? '✅ 准确' : '⚠️ 差异';
        const getDiffStyle = (i) => {
            const d = getDiff(i);
            if (d === '-') return '';
            return d === 0 ? 'color:var(--success)' : 'color:var(--error)';
        };

        const countedCount = computed(() => list.value.filter(i => i.actual !== null).length);
        const filteredList = computed(() => {
            // 默认显示全部，但如果有选中的件号，可以考虑让选中的排在第一位（逻辑略）
            return list.value;
        });

        const clearAll = () => { if(confirm("确定清空数据？")) { list.value = []; localStorage.clear(); } };

        const exportResults = () => {
            const ws = XLSX.utils.json_to_sheet(list.value.map(i => ({
                '件号': i.partNo, '应收': i.expected, '实收': i.actual || 0, '差异': getDiff(i)
            })));
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "清点报告");
            XLSX.writeFile(wb, `清点报告_${new Date().toLocaleDateString()}.xlsx`);
        };

        return { 
            list, searchQuery, suggestions, showSuggests, selectedItem, tempQty, qtyInput,
            countedCount, filteredList, handleFileUpload, triggerUpload, selectItem, 
            confirmQty, clearAll, exportResults, getStatusClass, getStatusText, getDiff, getDiffStyle
        }
    }
}).mount('#app');

// SW 注册
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
}
</script>
</body>
</html>
